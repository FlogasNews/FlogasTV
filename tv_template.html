<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="refresh" content="300">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flogas Energy Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --ticker-bg: #1e293b;
            --accent: #38bdf8;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Title */
        .dashboard-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 15px 0;
            margin: 0;
            background-color: var(--ticker-bg);
            border-bottom: 2px solid var(--accent);
        }
        /* 2x2 Grid for the charts */
        .charts-container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            flex-grow: 1;
            gap: 10px;
            padding: 10px;
            height: calc(100vh - 150px); 
        }
        .chart-box {
            background-color: var(--bg-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Force Plotly divs to fill their containers */
        .chart-box > div {
            width: 100% !important;
            height: 100% !important;
        }
        
        /* Smooth Scrolling Ticker */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background-color: var(--ticker-bg);
            border-top: 3px solid var(--accent);
            height: 60px;
            display: flex;
            align-items: center;
        }
        .ticker {
            display: flex;
            white-space: nowrap;
            padding-left: 100%;
            /* Doubled duration from 45s to 90s to cut speed by 50% */
            animation: ticker 110s linear infinite;
        }
        .ticker-item {
            font-size: 1.8rem;
            padding: 0 40px;
            font-weight: 500;
        }
        .ticker-item::after {
            content: " • ";
            color: var(--accent);
            margin-left: 40px;
        }
        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <h1 class="dashboard-title">Energy outlook</h1>

    <div class="charts-container">
        <div class="chart-box">{{ fig1_html | safe }}</div>
        <div class="chart-box">{{ fig2_html | safe }}</div>
        <div class="chart-box">{{ fig3_html | safe }}</div>
        <div class="chart-box">{{ fig4_html | safe }}</div>
    </div>

    <div class="ticker-wrap">
        <div class="ticker">
            {% for headline in headlines %}
                <div class="ticker-item">{{ headline }}</div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
